<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="greenBody" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#88ff88"/>
      <stop offset="100%" stop-color="#44ff44"/>
    </radialGradient>
    <radialGradient id="greenEye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dddddd"/>
    </radialGradient>
  </defs>
  <!-- Head (large round) -->
  <ellipse cx="30" cy="22" rx="22" ry="18" fill="url(#greenBody)" stroke="#222" stroke-width="2"/>
  <!-- Body (small) -->
  <ellipse cx="30" cy="44" rx="10" ry="8" fill="url(#greenBody)" stroke="#222" stroke-width="2"/>
  <!-- Neck connecting head to body -->
  <rect x="25" y="36" width="10" height="8" fill="#44ff44" stroke="none"/>
  <line x1="25" y1="37" x2="25" y2="43" stroke="#222" stroke-width="2"/>
  <line x1="35" y1="37" x2="35" y2="43" stroke="#222" stroke-width="2"/>
  <!-- Antennae -->
  <line x1="20" y1="8" x2="12" y2="2" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <circle cx="12" cy="2" r="2.5" fill="#88ff88" stroke="#222" stroke-width="1.5"/>
  <line x1="40" y1="8" x2="48" y2="2" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <circle cx="48" cy="2" r="2.5" fill="#88ff88" stroke="#222" stroke-width="1.5"/>
  <!-- Left eye (big) -->
  <ellipse cx="21" cy="20" rx="8" ry="9" fill="url(#greenEye)" stroke="#222" stroke-width="2"/>
  <!-- Right eye (big) -->
  <ellipse cx="39" cy="20" rx="8" ry="9" fill="url(#greenEye)" stroke="#222" stroke-width="2"/>
  <!-- Left pupil (angry, looking forward) -->
  <ellipse cx="23" cy="21" rx="3.5" ry="4.5" fill="#111"/>
  <circle cx="22" cy="19" r="1.2" fill="#fff"/>
  <!-- Right pupil -->
  <ellipse cx="37" cy="21" rx="3.5" ry="4.5" fill="#111"/>
  <circle cx="36" cy="19" r="1.2" fill="#fff"/>
  <!-- Angry eyebrows -->
  <line x1="13" y1="11" x2="24" y2="13" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="47" y1="11" x2="36" y2="13" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mean mouth -->
  <path d="M22 30 Q26 34 30 30 Q34 34 38 30" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Teeth -->
  <polygon points="25,30 27,33 29,30" fill="#fff" stroke="#222" stroke-width="1"/>
  <polygon points="31,30 33,33 35,30" fill="#fff" stroke="#222" stroke-width="1"/>
  <!-- Small arms -->
  <path d="M20 44 L10 48 L12 44" fill="#44ff44" stroke="#222" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M40 44 L50 48 L48 44" fill="#44ff44" stroke="#222" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Small legs -->
  <path d="M25 51 L22 58 L27 56" fill="#44ff44" stroke="#222" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M35 51 L38 58 L33 56" fill="#44ff44" stroke="#222" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
