<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="crateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e43"/>
      <stop offset="50%" stop-color="#6b553a"/>
      <stop offset="100%" stop-color="#4e3b28"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a3a"/>
      <stop offset="100%" stop-color="#556b2f"/>
    </linearGradient>
  </defs>
  <!-- Crate body -->
  <rect x="4" y="10" width="32" height="26" rx="2" ry="2" fill="url(#crateGrad)" stroke="#3e2723" stroke-width="2.5"/>
  <!-- Lid -->
  <rect x="3" y="8" width="34" height="7" rx="2" ry="2" fill="url(#lidGrad)" stroke="#33691e" stroke-width="2"/>
  <!-- Metal clasp -->
  <rect x="16" y="12" width="8" height="4" rx="1" fill="#bdbdbd" stroke="#616161" stroke-width="1"/>
  <!-- Bullet icons -->
  <rect x="10" y="20" width="4" height="10" rx="1.5" fill="#fdd835" stroke="#f57f17" stroke-width="0.8"/>
  <circle cx="12" cy="19.5" r="2" fill="#ffee58" stroke="#f57f17" stroke-width="0.8"/>
  <rect x="18" y="20" width="4" height="10" rx="1.5" fill="#fdd835" stroke="#f57f17" stroke-width="0.8"/>
  <circle cx="20" cy="19.5" r="2" fill="#ffee58" stroke="#f57f17" stroke-width="0.8"/>
  <rect x="26" y="20" width="4" height="10" rx="1.5" fill="#fdd835" stroke="#f57f17" stroke-width="0.8"/>
  <circle cx="28" cy="19.5" r="2" fill="#ffee58" stroke="#f57f17" stroke-width="0.8"/>
  <!-- Highlight -->
  <rect x="6" y="10" width="10" height="3" rx="1.5" fill="#ffffff" opacity="0.25"/>
</svg>
