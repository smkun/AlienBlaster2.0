<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="redBody" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff8888"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </radialGradient>
    <radialGradient id="redEye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffcc"/>
      <stop offset="100%" stop-color="#ffff44"/>
    </radialGradient>
  </defs>
  <!-- Spiky head crest -->
  <polygon points="15,18 10,4 20,14" fill="#ff4444" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="25,12 22,0 30,10" fill="#ff4444" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="35,12 38,0 30,10" fill="#ff4444" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <polygon points="45,18 50,4 40,14" fill="#ff4444" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <!-- Main head -->
  <ellipse cx="30" cy="24" rx="20" ry="16" fill="url(#redBody)" stroke="#222" stroke-width="2"/>
  <!-- Body (medium, stockier than green) -->
  <ellipse cx="30" cy="46" rx="14" ry="10" fill="url(#redBody)" stroke="#222" stroke-width="2"/>
  <!-- Neck -->
  <rect x="23" y="36" width="14" height="10" fill="#ff4444" stroke="none"/>
  <line x1="23" y1="37" x2="23" y2="44" stroke="#222" stroke-width="2"/>
  <line x1="37" y1="37" x2="37" y2="44" stroke="#222" stroke-width="2"/>
  <!-- Left eye (angry yellow) -->
  <ellipse cx="22" cy="22" rx="7" ry="6" fill="url(#redEye)" stroke="#222" stroke-width="2"/>
  <!-- Right eye -->
  <ellipse cx="38" cy="22" rx="7" ry="6" fill="url(#redEye)" stroke="#222" stroke-width="2"/>
  <!-- Left pupil (slit, reptilian) -->
  <ellipse cx="22" cy="22" rx="2" ry="5" fill="#111"/>
  <ellipse cx="21.5" cy="20.5" rx="0.8" ry="1.5" fill="#ff4444" opacity="0.5"/>
  <!-- Right pupil -->
  <ellipse cx="38" cy="22" rx="2" ry="5" fill="#111"/>
  <ellipse cx="37.5" cy="20.5" rx="0.8" ry="1.5" fill="#ff4444" opacity="0.5"/>
  <!-- Heavy angry brow -->
  <path d="M14 15 L24 18" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <path d="M46 15 L36 18" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Snarling mouth -->
  <path d="M20 32 Q25 28 30 32 Q35 28 40 32" fill="none" stroke="#222" stroke-width="2"/>
  <!-- Fangs -->
  <polygon points="22,31 24,36 26,31" fill="#fff" stroke="#222" stroke-width="1"/>
  <polygon points="34,31 36,36 38,31" fill="#fff" stroke="#222" stroke-width="1"/>
  <polygon points="28,32 30,35 32,32" fill="#fff" stroke="#222" stroke-width="1"/>
  <!-- Muscular arms with claws -->
  <path d="M16 44 L6 40 L4 44 L8 42" fill="#ff4444" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <path d="M44 44 L54 40 L56 44 L52 42" fill="#ff4444" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <!-- Legs with claws -->
  <path d="M22 54 L18 58 L22 57 L20 60" fill="#ff4444" stroke="#222" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M38 54 L42 58 L38 57 L40 60" fill="#ff4444" stroke="#222" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Shoulder spikes -->
  <polygon points="16,40 8,36 14,42" fill="#cc2222" stroke="#222" stroke-width="1.5"/>
  <polygon points="44,40 52,36 46,42" fill="#cc2222" stroke="#222" stroke-width="1.5"/>
</svg>
