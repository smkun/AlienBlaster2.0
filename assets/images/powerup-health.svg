<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="healthGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#44ff66" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#44ff66" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="containerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#81c784"/>
    </linearGradient>
  </defs>
  <!-- Glow -->
  <circle cx="20" cy="20" r="19" fill="url(#healthGlow)"/>
  <!-- Container body -->
  <rect x="5" y="5" width="30" height="30" rx="5" ry="5" fill="url(#containerGrad)" stroke="#2e7d32" stroke-width="2.5"/>
  <!-- White background circle for cross -->
  <circle cx="20" cy="20" r="10" fill="#ffffff" stroke="#c62828" stroke-width="1.5"/>
  <!-- Red cross -->
  <rect x="17" y="11" width="6" height="18" rx="1" fill="#d32f2f"/>
  <rect x="11" y="17" width="18" height="6" rx="1" fill="#d32f2f"/>
  <!-- Highlight -->
  <rect x="7" y="7" width="12" height="4" rx="2" fill="#ffffff" opacity="0.4"/>
</svg>
