<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Subtle shadow for depth -->
    <filter id="rock-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Asteroid 1 - medium irregular rock, upper left area -->
  <g filter="url(#rock-shadow)" transform="translate(150, 120) rotate(15)">
    <polygon points="0,-18 12,-14 20,-4 18,10 8,18 -6,16 -16,8 -18,-4 -10,-16"
             fill="#5a5045" stroke="#4a4035" stroke-width="0.5"/>
    <polygon points="-2,-14 8,-10 14,-2 10,8 2,12 -8,6 -12,-2 -6,-12"
             fill="#6b6055" opacity="0.5"/>
    <!-- Surface detail -->
    <circle cx="4" cy="-2" r="3" fill="#4a4035" opacity="0.3"/>
    <circle cx="-5" cy="6" r="2" fill="#4a4035" opacity="0.25"/>
  </g>

  <!-- Asteroid 2 - small chunk, right side -->
  <g filter="url(#rock-shadow)" transform="translate(950, 280) rotate(-25)">
    <polygon points="0,-12 10,-8 14,0 10,10 2,12 -8,8 -12,0 -8,-10"
             fill="#6e6358" stroke="#5e5348" stroke-width="0.5"/>
    <polygon points="2,-8 7,-5 9,1 6,7 0,8 -5,4 -7,-1 -4,-7"
             fill="#7a7068" opacity="0.4"/>
    <circle cx="2" cy="1" r="2" fill="#5e5348" opacity="0.3"/>
  </g>

  <!-- Asteroid 3 - larger jagged rock, center-bottom -->
  <g filter="url(#rock-shadow)" transform="translate(580, 650) rotate(40)">
    <polygon points="0,-25 15,-20 24,-8 22,8 14,22 0,26 -12,20 -22,10 -24,-6 -16,-20"
             fill="#5c5248" stroke="#4c4238" stroke-width="0.5"/>
    <polygon points="2,-18 12,-14 18,-4 14,10 6,16 -4,14 -14,6 -16,-4 -10,-14"
             fill="#6d6358" opacity="0.45"/>
    <!-- Crater details -->
    <circle cx="5" cy="-5" r="4" fill="#4c4238" opacity="0.3"/>
    <circle cx="-8" cy="8" r="3" fill="#4c4238" opacity="0.25"/>
    <circle cx="8" cy="10" r="2" fill="#4c4238" opacity="0.2"/>
  </g>

  <!-- Asteroid 4 - tiny fragment, upper right -->
  <g filter="url(#rock-shadow)" transform="translate(1050, 90) rotate(70)">
    <polygon points="0,-8 6,-5 8,2 4,7 -3,6 -7,0 -4,-6"
             fill="#7a6e62" stroke="#6a5e52" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="1.5" fill="#6a5e52" opacity="0.3"/>
  </g>

  <!-- Asteroid 5 - medium rock with brownish tint, left side -->
  <g filter="url(#rock-shadow)" transform="translate(80, 500) rotate(-10)">
    <polygon points="0,-16 10,-12 16,-2 14,10 6,16 -6,14 -14,6 -16,-4 -8,-14"
             fill="#685c50" stroke="#584c40" stroke-width="0.5"/>
    <polygon points="0,-10 6,-8 10,-1 8,6 2,10 -4,8 -8,3 -8,-4 -4,-9"
             fill="#786c60" opacity="0.4"/>
    <circle cx="-3" cy="2" r="2.5" fill="#584c40" opacity="0.3"/>
    <circle cx="5" cy="-4" r="1.5" fill="#584c40" opacity="0.25"/>
  </g>

  <!-- Asteroid 6 - small angular piece, center top -->
  <g filter="url(#rock-shadow)" transform="translate(700, 50) rotate(55)">
    <polygon points="0,-10 8,-6 10,3 6,10 -4,8 -10,2 -6,-8"
             fill="#625848" stroke="#524838" stroke-width="0.5"/>
    <circle cx="1" cy="0" r="2" fill="#524838" opacity="0.3"/>
  </g>

  <!-- Asteroid 7 - tiny speck, lower right -->
  <g filter="url(#rock-shadow)" transform="translate(1100, 580) rotate(30)">
    <polygon points="0,-6 5,-3 6,3 2,6 -4,4 -5,-2"
             fill="#706458" stroke="#605448" stroke-width="0.5"/>
  </g>

  <!-- Asteroid 8 - medium irregular, mid-left -->
  <g filter="url(#rock-shadow)" transform="translate(350, 380) rotate(-45)">
    <polygon points="0,-14 9,-11 15,-3 12,8 4,14 -6,12 -14,4 -12,-6 -6,-13"
             fill="#5e5445" stroke="#4e4435" stroke-width="0.5"/>
    <polygon points="1,-9 6,-7 9,-1 7,5 2,8 -3,6 -8,2 -7,-4 -3,-8"
             fill="#6e6455" opacity="0.4"/>
    <circle cx="-2" cy="0" r="2" fill="#4e4435" opacity="0.3"/>
  </g>
</svg>