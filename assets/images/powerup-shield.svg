<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#80d8ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#40c4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0091ea" stop-opacity="0"/>
    </radialGradient>
    <filter id="energyGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer energy glow -->
  <circle cx="20" cy="20" r="19" fill="url(#shieldGlow)" filter="url(#energyGlow)"/>
  <!-- Shield shape -->
  <path d="M20,4 L34,11 L34,22 C34,30 27,36 20,38 C13,36 6,30 6,22 L6,11 Z"
        fill="url(#shieldGrad)" stroke="#01579b" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner highlight -->
  <path d="M20,8 L30,13 L30,22 C30,28 25,33 20,34.5 C15,33 10,28 10,22 L10,13 Z"
        fill="none" stroke="#80d8ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Star/energy symbol in center -->
  <polygon points="20,13 22,18 27,18 23,21 24.5,26 20,23 15.5,26 17,21 13,18 18,18"
           fill="#e1f5fe" stroke="#4fc3f7" stroke-width="0.8"/>
  <!-- Top highlight -->
  <ellipse cx="17" cy="12" rx="5" ry="2.5" fill="#ffffff" opacity="0.35"/>
</svg>
