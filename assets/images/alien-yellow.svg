<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60" width="80" height="60">
  <defs>
    <radialGradient id="yellowBody" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffaa"/>
      <stop offset="100%" stop-color="#ffff44"/>
    </radialGradient>
    <linearGradient id="armorPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dddd22"/>
      <stop offset="100%" stop-color="#aaaa00"/>
    </linearGradient>
    <radialGradient id="yellowEye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffdddd"/>
    </radialGradient>
  </defs>
  <!-- Armor shell / back plate -->
  <ellipse cx="40" cy="30" rx="36" ry="26" fill="url(#armorPlate)" stroke="#222" stroke-width="2.5"/>
  <!-- Main body -->
  <ellipse cx="40" cy="30" rx="30" ry="22" fill="url(#yellowBody)" stroke="#222" stroke-width="2.5"/>
  <!-- Armor plating lines (horizontal) -->
  <path d="M14 22 Q40 20 66 22" fill="none" stroke="#222" stroke-width="1.5" opacity="0.6"/>
  <path d="M12 30 Q40 28 68 30" fill="none" stroke="#222" stroke-width="1.5" opacity="0.6"/>
  <path d="M14 38 Q40 36 66 38" fill="none" stroke="#222" stroke-width="1.5" opacity="0.6"/>
  <!-- Armor plating lines (vertical) -->
  <path d="M30 10 Q29 30 30 50" fill="none" stroke="#222" stroke-width="1" opacity="0.4"/>
  <path d="M50 10 Q51 30 50 50" fill="none" stroke="#222" stroke-width="1" opacity="0.4"/>
  <!-- Head dome (integrated into body, tough look) -->
  <ellipse cx="40" cy="18" rx="18" ry="12" fill="url(#yellowBody)" stroke="#222" stroke-width="2.5"/>
  <!-- Heavy brow ridge -->
  <path d="M22 16 L40 12 L58 16" fill="#dddd22" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left eye (small, mean, deep-set) -->
  <ellipse cx="32" cy="20" rx="5" ry="4" fill="url(#yellowEye)" stroke="#222" stroke-width="2"/>
  <!-- Right eye -->
  <ellipse cx="48" cy="20" rx="5" ry="4" fill="url(#yellowEye)" stroke="#222" stroke-width="2"/>
  <!-- Left pupil (tiny, angry) -->
  <circle cx="33" cy="20.5" r="2.5" fill="#880000"/>
  <circle cx="32.5" cy="19.5" r="0.8" fill="#fff"/>
  <!-- Right pupil -->
  <circle cx="47" cy="20.5" r="2.5" fill="#880000"/>
  <circle cx="46.5" cy="19.5" r="0.8" fill="#fff"/>
  <!-- Grim mouth -->
  <path d="M32 26 L40 28 L48 26" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Underbite jaw -->
  <path d="M30 27 Q40 32 50 27" fill="#dddd22" stroke="#222" stroke-width="2"/>
  <!-- Jaw teeth -->
  <rect x="34" y="26" width="3" height="3" fill="#fff" stroke="#222" stroke-width="1" rx="0.5"/>
  <rect x="39" y="27" width="3" height="3" fill="#fff" stroke="#222" stroke-width="1" rx="0.5"/>
  <rect x="44" y="26" width="3" height="3" fill="#fff" stroke="#222" stroke-width="1" rx="0.5"/>
  <!-- Heavy armored arms -->
  <path d="M10 30 L2 26 L2 34 Z" fill="#dddd22" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M70 30 L78 26 L78 34 Z" fill="#dddd22" stroke="#222" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Shoulder armor pads -->
  <ellipse cx="14" cy="28" rx="6" ry="8" fill="url(#armorPlate)" stroke="#222" stroke-width="2"/>
  <ellipse cx="66" cy="28" rx="6" ry="8" fill="url(#armorPlate)" stroke="#222" stroke-width="2"/>
  <!-- Armor rivets -->
  <circle cx="14" cy="24" r="1.5" fill="#888" stroke="#222" stroke-width="1"/>
  <circle cx="14" cy="32" r="1.5" fill="#888" stroke="#222" stroke-width="1"/>
  <circle cx="66" cy="24" r="1.5" fill="#888" stroke="#222" stroke-width="1"/>
  <circle cx="66" cy="32" r="1.5" fill="#888" stroke="#222" stroke-width="1"/>
  <!-- Stumpy legs -->
  <rect x="28" y="48" width="8" height="10" rx="3" fill="#dddd22" stroke="#222" stroke-width="2.5"/>
  <rect x="44" y="48" width="8" height="10" rx="3" fill="#dddd22" stroke="#222" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="32" cy="58" rx="6" ry="3" fill="#aaaa00" stroke="#222" stroke-width="2"/>
  <ellipse cx="48" cy="58" rx="6" ry="3" fill="#aaaa00" stroke="#222" stroke-width="2"/>
</svg>
