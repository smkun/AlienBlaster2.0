<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="goGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="50%" stop-color="#d32f2f"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </linearGradient>
    <filter id="goGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ff1744" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Outline/shadow text -->
  <text x="200" y="58" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif" font-size="56" font-weight="900"
        letter-spacing="6" filter="url(#goShadow)">
    <tspan fill="url(#goGrad)" stroke="#4a0000" stroke-width="3">GAME OVER</tspan>
  </text>
  <!-- Inner highlight pass -->
  <text x="200" y="58" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif" font-size="56" font-weight="900"
        letter-spacing="6" filter="url(#goGlow)">
    <tspan fill="url(#goGrad)" stroke="none">GAME OVER</tspan>
  </text>
  <!-- Top specular highlight -->
  <text x="200" y="58" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif" font-size="56" font-weight="900"
        letter-spacing="6" opacity="0.15" fill="#ffffff">
    GAME OVER
  </text>
</svg>
