<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <radialGradient id="purpleBody" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#cc88ff"/>
      <stop offset="100%" stop-color="#aa44ff"/>
    </radialGradient>
    <linearGradient id="purpleWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cc88ff"/>
      <stop offset="100%" stop-color="#7722cc"/>
    </linearGradient>
    <radialGradient id="purpleEye" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eeddff"/>
    </radialGradient>
  </defs>
  <!-- Swept-back fins/wings (aerodynamic) -->
  <path d="M10 28 L1 12 L18 24 Z" fill="url(#purpleWing)" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <path d="M50 28 L59 12 L42 24 Z" fill="url(#purpleWing)" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <!-- Lower fins -->
  <path d="M12 38 L2 52 L20 40 Z" fill="url(#purpleWing)" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <path d="M48 38 L58 52 L40 40 Z" fill="url(#purpleWing)" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <!-- Sleek body (elongated, aerodynamic) -->
  <ellipse cx="30" cy="30" rx="16" ry="22" fill="url(#purpleBody)" stroke="#222" stroke-width="2"/>
  <!-- Head (pointed, sleek) -->
  <path d="M20 18 Q30 2 40 18 Q35 16 30 15 Q25 16 20 18 Z" fill="#cc88ff" stroke="#222" stroke-width="2"/>
  <!-- Speed lines on body -->
  <path d="M22 22 L22 38" stroke="#7722cc" stroke-width="1" opacity="0.4"/>
  <path d="M26 18 L26 42" stroke="#7722cc" stroke-width="1" opacity="0.3"/>
  <path d="M34 18 L34 42" stroke="#7722cc" stroke-width="1" opacity="0.3"/>
  <path d="M38 22 L38 38" stroke="#7722cc" stroke-width="1" opacity="0.4"/>
  <!-- Eyes (angular, sharp) -->
  <path d="M21 22 L27 19 L28 25 Z" fill="url(#purpleEye)" stroke="#222" stroke-width="2"/>
  <path d="M39 22 L33 19 L32 25 Z" fill="url(#purpleEye)" stroke="#222" stroke-width="2"/>
  <!-- Pupils (sharp, focused) -->
  <circle cx="25" cy="22" r="2" fill="#220044"/>
  <circle cx="24.5" cy="21" r="0.7" fill="#fff"/>
  <circle cx="35" cy="22" r="2" fill="#220044"/>
  <circle cx="34.5" cy="21" r="0.7" fill="#fff"/>
  <!-- Thin menacing mouth -->
  <path d="M24 30 Q30 33 36 30" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Sharp chin/tail -->
  <path d="M25 48 Q30 58 35 48" fill="#aa44ff" stroke="#222" stroke-width="2" stroke-linejoin="round"/>
  <!-- Energy core glow -->
  <ellipse cx="30" cy="34" rx="4" ry="3" fill="#ee99ff" stroke="#7722cc" stroke-width="1" opacity="0.7"/>
  <ellipse cx="30" cy="34" rx="2" ry="1.5" fill="#ffffff" opacity="0.6"/>
</svg>
