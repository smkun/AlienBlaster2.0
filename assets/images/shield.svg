<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#00ccff" stop-opacity="0.08"/>
      <stop offset="85%" stop-color="#00aaff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0088ff" stop-opacity="0.02"/>
    </radialGradient>
    <radialGradient id="shieldRim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
      <stop offset="75%" stop-color="#00ddff" stop-opacity="0"/>
      <stop offset="90%" stop-color="#00eeff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.1"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="40%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shieldBlur">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="40" cy="40" r="37" fill="none" stroke="#00ddff" stroke-width="3" opacity="0.2" filter="url(#shieldBlur)"/>

  <!-- Main shield bubble -->
  <circle cx="40" cy="40" r="35" fill="url(#shieldGlow)"/>

  <!-- Rim energy -->
  <circle cx="40" cy="40" r="35" fill="url(#shieldRim)"/>

  <!-- Visible edge ring -->
  <circle cx="40" cy="40" r="35" fill="none" stroke="#00eeff" stroke-width="1.5" opacity="0.55" filter="url(#shieldBlur)"/>

  <!-- Inner light highlight (specular) -->
  <circle cx="40" cy="40" r="32" fill="url(#innerGlow)"/>

  <!-- Energy crackle lines -->
  <path d="M20,25 L28,30 L24,36 L30,40" fill="none" stroke="#66ffff" stroke-width="0.7" opacity="0.3" stroke-linecap="round"/>
  <path d="M55,20 L50,28 L56,34" fill="none" stroke="#66ffff" stroke-width="0.7" opacity="0.25" stroke-linecap="round"/>
  <path d="M50,55 L45,50 L48,44" fill="none" stroke="#66ffff" stroke-width="0.6" opacity="0.2" stroke-linecap="round"/>

  <!-- Subtle hex pattern hints -->
  <polygon points="40,18 46,22 46,30 40,34 34,30 34,22" fill="none" stroke="#44ddff" stroke-width="0.5" opacity="0.15"/>
  <polygon points="52,30 58,34 58,42 52,46 46,42 46,34" fill="none" stroke="#44ddff" stroke-width="0.5" opacity="0.12"/>
  <polygon points="28,38 34,42 34,50 28,54 22,50 22,42" fill="none" stroke="#44ddff" stroke-width="0.5" opacity="0.12"/>
</svg>
