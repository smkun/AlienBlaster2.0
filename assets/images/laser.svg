<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 8" width="20" height="8">
  <defs>
    <linearGradient id="laserGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3333" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#ff3333"/>
      <stop offset="70%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#ffcccc"/>
    </linearGradient>
    <linearGradient id="laserCore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8888" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffaaaa"/>
      <stop offset="70%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="11" cy="4" rx="9" ry="3.5" fill="#ff3333" opacity="0.15" filter="url(#glow)"/>

  <!-- Main beam body — tapered polygon -->
  <polygon points="1,5.5 1,2.5 18,3 20,4 18,5" fill="url(#laserGrad)" filter="url(#glow)"/>

  <!-- Bright core — thinner, whiter -->
  <polygon points="3,4.8 3,3.2 18,3.5 19.5,4 18,4.5" fill="url(#laserCore)" opacity="0.9"/>

  <!-- Hot tip -->
  <circle cx="19.5" cy="4" r="1" fill="#fff" opacity="0.9"/>
</svg>
