<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="spBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe0cc"/>
      <stop offset="100%" stop-color="#ff8844"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#cc5500"/>
      <stop offset="40%" stop-color="#ff8844"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="speedGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="20" cy="20" r="18" fill="url(#spBg)" stroke="#cc5500" stroke-width="2.5"/>
  <!-- Inner glow -->
  <circle cx="20" cy="20" r="12" fill="#ffaa66" opacity="0.3"/>
  <!-- Upward arrow -->
  <polygon points="20,5 30,18 24,18 24,33 16,33 16,18 10,18" fill="url(#arrowGrad)" stroke="#993300" stroke-width="1.8" stroke-linejoin="round" filter="url(#speedGlow)"/>
  <!-- Speed lines (left side) -->
  <line x1="4" y1="14" x2="9" y2="14" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="3" y1="20" x2="8" y2="20" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="4" y1="26" x2="9" y2="26" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Speed lines (right side) -->
  <line x1="31" y1="14" x2="36" y2="14" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="32" y1="20" x2="37" y2="20" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="31" y1="26" x2="36" y2="26" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Chevron speed marks above arrow -->
  <polyline points="14,8 20,3 26,8" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="15,12 20,7 25,12" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
</svg>
